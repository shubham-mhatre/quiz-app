<mat-toolbar color="primary" class="toolbar">
  <button mat-button class="title" (click)="backToDashboard()">Quiz App</button>

  <span class="spacer"></span>

  <button mat-button (click)="quizHistory()" *ngIf="role === 'USER'">
    Quiz History
  </button>

  <button mat-button (click)="logout()" *ngIf="role === 'USER'">
    All Questions
  </button>

  <span class="user">
    Welcome, {{ username }}
  </span>

  <button mat-button (click)="logout()">Logout</button>
</mat-toolbar>
