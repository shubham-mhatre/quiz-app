<div class="quiz-result-container">
  <h2>Quiz Results</h2>

  <!-- ================= SUMMARY MODE ================= -->
  <div *ngIf="!reviewMode && summary">

    <p><strong>Total Questions:</strong> {{ summary.totalQuestions }}</p>
    <p><strong>Correct Answers:</strong> {{ summary.correctAnswers }}</p>

    <button mat-raised-button color="primary" (click)="reviewQuiz()">
      Review Quiz
    </button>

    <button mat-raised-button color="accent" (click)="backToDashboard()">
      Back to Dashboard
    </button>

  </div>

  <!-- ================= REVIEW MODE ================= -->
  <div *ngIf="reviewMode" class="questions-list">

    <div *ngFor="let question of reviewQuestions; let i = index" class="question-card">

      <h3>Q{{ i + 1 }}: {{ question.questionText }}</h3>

      <ul>
        <li *ngFor="let option of question.options"
            [ngClass]="{
              'user-selected': isOptionSelected(i, option.id),
              'correct-option': isOptionCorrect(i, option.id),
              'wrong-selected': isOptionSelected(i, option.id) && !isOptionCorrect(i, option.id)
            }">

          {{ option.text }}

          <!-- Selected & Correct -->
          <span *ngIf="isOptionSelected(i, option.id) && isOptionCorrect(i, option.id)"
                class="badge correct">
            ✔ Your Answer
          </span>

          <!-- Selected & Wrong -->
          <span *ngIf="isOptionSelected(i, option.id) && !isOptionCorrect(i, option.id)"
                class="badge wrong">
            ✖ Your Answer
          </span>

          <!-- Not Selected but Correct -->
          <span *ngIf="!isOptionSelected(i, option.id) && isOptionCorrect(i, option.id)"
                class="badge correct">
            ✔ Correct Answer
          </span>

        </li>
      </ul>

      <!-- Explanation -->
      <div *ngIf="question.explanation" class="explanation">
        <strong>Explanation:</strong>
        <p>{{ question.explanation }}</p>
      </div>

    </div>

    <button mat-raised-button color="accent" (click)="backToDashboard()">
      Back to Dashboard
    </button>

  </div>
</div>
