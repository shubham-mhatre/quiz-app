<h2 mat-dialog-title>Start Quiz</h2>

<mat-dialog-content>
  <mat-form-field appearance="fill">
    <mat-label>Enter Number of Questions</mat-label>
    <input matInput type="number" [(ngModel)]="numberOfQuestions" min="1">
  </mat-form-field>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button mat-dialog-close>Cancel</button>
  <button mat-raised-button color="primary" (click)="startQuiz()">Start Quiz</button>
</mat-dialog-actions>
