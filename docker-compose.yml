version: "3.8"

services:

  mysql:
    image: mysql:8.0.44
    container_name: quiz-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: quiz_db
    ports:
      - "3307:3306"
    volumes:
      - ./quiz-app_db.sql:/docker-entrypoint-initdb.d/init.sql

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./quiz-app-backend
    container_name: quiz-backend
    depends_on:
        mysql:
            condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/quiz_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root     

  frontend:
    build: ./quiz-app-ui
    container_name: quiz-frontend
    depends_on:
      - backend
    ports:
      - "4200:80"